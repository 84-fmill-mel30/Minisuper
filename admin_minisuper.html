<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Mini Super </title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f4f4f4}.container{max-width:1200px;margin:2rem auto;padding:2rem;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}h1{color:#2a5298;margin-bottom:2rem}table{width:100%;border-collapse:collapse;margin-top:2rem}th,td{padding:1rem;text-align:left;border-bottom:1px solid #ddd}th{background:#2a5298;color:#fff}button{background:#2a5298;color:#fff;border:none;padding:0.5rem 1rem;border-radius:4px;cursor:pointer;margin:0.2rem}button.delete{background:#e74c3c}button:hover{opacity:0.9}.form-group{margin-bottom:1rem}.form-group label{display:block;margin-bottom:0.5rem;font-weight:bold}.form-group input{width:100%;padding:0.8rem;border:1px solid #ddd;border-radius:4px;font-size:1rem}nav{margin-bottom:2rem}nav a{color:#2a5298;text-decoration:none;margin-right:1rem}
</style>
</head>
<body>
<div class="container">
<nav><a href="index_refaccionaria.html">← Volver al Inicio</a></nav>
<h1>👤 Panel de Administrador</h1>
<h2>Agregar Nuevo Producto</h2>
<div class="form-group"><label>Código:</label><input type="text" id="newCodigo" placeholder="SF492"></div>
<div class="form-group"><label>Descripción:</label><input type="text" id="newDesc" placeholder="SOLENOIDE PARED ACURAT"></div>
<div class="form-group"><label>Precio:</label><input type="number" id="newPrecio" placeholder="195"></div>
<div class="form-group"><label>Stock:</label><input type="number" id="newStock" placeholder="5"></div>
<div class="form-group"><label>Categoría:</label><input type="text" id="newCategoria" placeholder="Solenoides"></div>
<button onclick="agregarProducto()">➕ Agregar Producto</button>
<h2 style="margin-top:3rem">Productos Actuales</h2>
<input type="text" id="filterInput" placeholder="Filtrar productos..." style="width:100%;padding:1rem;margin-bottom:1rem;border:1px solid #ddd;border-radius:4px" onkeyup="filtrarTabla()">
<table id="productTable"><thead><tr><th>Código</th><th>Descripción</th><th>Precio</th><th>Stock</th><th>Categoría</th><th>Acciones</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>
<script src="productos_db.js"></script>
<script>
function cargarTabla(){let tb=document.getElementById('tableBody');tb.innerHTML=productos.map((p,i)=>`<tr><td>${p.codigo}</td><td>${p.descripcion}</td><td>$${p.precio}</td><td>${p.stock}</td><td>${p.categoria}</td><td><button onclick="editarProducto(${i})">✏️ Editar</button> <button class="delete" onclick="eliminarProducto(${i})">🗑️ Eliminar</button></td></tr>`).join('')}
function agregarProducto(){let c=document.getElementById('newCodigo').value;let d=document.getElementById('newDesc').value;let p=parseFloat(document.getElementById('newPrecio').value);let s=parseInt(document.getElementById('newStock').value);let cat=document.getElementById('newCategoria').value;if(!c||!d||!p||!s||!cat){alert('Completa todos los campos');return}productos.push({codigo:c,descripcion:d,precio:p,stock:s,categoria:cat});alert('Producto agregado');document.getElementById('newCodigo').value='';document.getElementById('newDesc').value='';document.getElementById('newPrecio').value='';document.getElementById('newStock').value='';document.getElementById('newCategoria').value='';cargarTabla()}
function eliminarProducto(i){if(confirm('¿Eliminar este producto?')){productos.splice(i,1);cargarTabla();alert('Producto eliminado')}}
function editarProducto(i){let p=productos[i];let np=prompt('Nuevo precio:',p.precio);let ns=prompt('Nuevo stock:',p.stock);if(np)p.precio=parseFloat(np);if(ns)p.stock=parseInt(ns);cargarTabla();alert('Producto actualizado')}
function filtrarTabla(){let f=document.getElementById('filterInput').value.toLowerCase();let r=document.querySelectorAll('#tableBody tr');r.forEach(row=>{let t=row.textContent.toLowerCase();row.style.display=t.includes(f)?'':'none'})}
cargarTabla();
</script>
</body>
</html>
